server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin,RETAIN_UNIQUE
        - DedupeResponseHeader=Access-Control-Allow-Credentials,RETAIN_UNIQUE
        - PreserveHostHeader

      routes:
        # ── Auth-Service ────────────────────────────────────────────
        # TokenController (/api/v1/auth), TwoFactorController (/api/v1/2fa)
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/2fa/**
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker

        # ── User-Service ────────────────────────────────────────────
        # AuthController (/api/v1/users: register, login)
        # UserSettingsController (/api/v1/settings)
        # AccountController (/api/v1/user-accounts: link, all, validate, delete)
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**,/api/v1/settings/**,/api/v1/user-accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker

        # ── Account-Service ─────────────────────────────────────────
        # AccountController (/api/v1/accounts: create, list, get, status, statements)
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountServiceCircuitBreaker

        # ── Card-Service ────────────────────────────────────────────
        # CardController (/api/v1/cards: issue, list, get, status, limits, transactions)
        - id: card-service
          uri: lb://card-service
          predicates:
            - Path=/api/v1/cards/**
          filters:
            - name: CircuitBreaker
              args:
                name: cardServiceCircuitBreaker

        # ── Transaction-Service ─────────────────────────────────────
        # TransactionController (/api/v1/transactions: transfer, card-payment, list, detail)
        # ScheduledTransactionController (/api/v1/transactions/scheduled: CRUD)
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionServiceCircuitBreaker

        # ── Notification-Service ────────────────────────────────────
        # NotificationController (/api/v1/notifications: list, get, read, read-all, delete)
        # AdminNotificationController (/api/v1/admin/notifications: send, bulk, broadcast — ROLE_ADMIN)
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**,/api/v1/admin/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker

      httpclient:
        connect-timeout: 3000
        # Must be >= resilience4j timelimiter timeout-duration, else the HTTP client
        # aborts before the circuit-breaker window and cold calls fail early.
        response-timeout: 20s
        pool:
          max-connections: 500
          acquire-timeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    instance-id: ${SPRING_APPLICATION_NAME}:${random.uuid}
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 45

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: read_only
  metrics:
    tags:
      service: ${SPRING_APPLICATION_NAME}
  tracing:
    sampling:
      probability: 1.0

frontend:
  url: ${FRONTEND_URL}

# CircuitBreaker filters default to a 1s TimeLimiter — too low for cold JVM
# calls (Kafka producer init, first Feign/DB hit). Raise to match httpclient.
resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 20s
        cancel-running-future: true
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
